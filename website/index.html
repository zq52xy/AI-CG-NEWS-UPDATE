<!--
  [INPUT]: 依赖 `style.css` 与 `app.js` 渲染与交互
  [OUTPUT]: 输出主页面结构与可访问性语义
  [POS]: website 的入口 HTML 模板，定义布局骨架
  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & CG 每日资讯</title>
    <!-- 首屏前应用主题，避免闪烁 -->
    <script>
        (function () {
            var t = localStorage.getItem('aicg_news_theme');
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=32">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
</head>

<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📰</span>
                    <span class="logo-text">Daily News</span>
                </div>
            </div>
            <nav class="nav">
                <div class="nav-section">
                    <div class="nav-title">我的收藏</div>
                    <ul class="history-list" id="favList">
                        <!-- 动态填充 -->
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-title">历史记录</div>
                    <ul class="history-list" id="historyList">
                        <!-- 动态填充 -->
                    </ul>
                </div>
            </nav>
            <div class="sidebar-footer">
                <!-- Phase 1: 行为设计 - 连续打开天数 -->
                <div class="streak-display" id="streakDisplay">
                    <svg class="icon icon-md" viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />
                    </svg>
                    <span class="streak-text" id="streakText">加载中...</span>
                </div>

                <button class="refresh-btn" id="refreshBtn" aria-label="刷新数据">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 16h5v5" />
                    </svg>
                    刷新数据
                </button>

                <!-- Jony Ive Redesign: Moved Meta Info -->
                <div class="sidebar-meta-info">
                    <div class="meta-row">
                        <span class="beijing-time" id="beijingTime"></span>
                        <span class="status" id="status">● 在线</span>
                    </div>
                    <div class="meta-row">
                        <span class="date" id="currentDate"></span>
                    </div>
                </div>

                <!-- Phase 1: 行为设计 - 固定时间 Cue -->
                <div class="update-hint" id="updateHint">
                    <svg class="icon icon-sm" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    <span class="update-hint-text">每日北京时间 08:00 更新</span>
                </div>
            </div>
        </aside>

        <!-- 移动端遮罩层 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 主内容区 -->
        <main class="main">
            <header class="header">
                <div class="header-content">
                    <!-- 移动端菜单按钮 -->
                    <button class="menu-btn" id="menuBtn" aria-label="打开菜单">
                        <svg class="icon icon-lg" viewBox="0 0 24 24" aria-hidden="true">
                            <line x1="4" y1="6" x2="20" y2="6" />
                            <line x1="4" y1="12" x2="20" y2="12" />
                            <line x1="4" y1="18" x2="20" y2="18" />
                        </svg>
                    </button>
                    <h1 class="page-title" id="pageTitle">AI & CG 每日资讯</h1>
                    <div class="header-meta">
                        <div class="search-box">
                            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                            <input type="text" id="searchInput" placeholder="搜索文章 (按 / 聚焦)..." aria-label="搜索文章" />
                            <button class="search-clear" id="searchClear" aria-label="清除搜索" type="button"><svg
                                    class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <line x1="18" y1="6" x2="6" y2="18" />
                                    <line x1="6" y1="6" x2="18" y2="18" />
                                </svg></button>
                            <span class="search-count" id="searchCount" aria-live="polite"></span>
                        </div>
                        <!-- Phase 1: 行为设计 - 今日状态标签 -->
                        <span class="today-badge" id="todayBadge"></span>
                        <!-- Phase 2: 行为设计 - 返回今日快捷入口 -->
                        <button class="back-to-today" id="backToToday" aria-label="返回今日新闻">
                            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                            <span class="back-to-today-text">返回今日</span>
                        </button>
                    </div>
                </div>
            </header>

            <!-- 标签筛选栏 -->
            <div class="tag-filter-bar collapsed" id="tagFilterBar">
                <div class="tag-filter-header">
                    <div class="tag-filter-title-group">
                        <span class="tag-filter-title"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path
                                    d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z" />
                                <path d="M7 7h.01" />
                            </svg> 标签筛选</span>
                        <button class="tag-toggle-btn" id="tagToggleBtn" aria-label="展开/收起标签">
                            <span class="toggle-text">展开</span>
                            <svg class="icon icon-sm" viewBox="0 0 24 24" aria-hidden="true">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                    <button class="tag-clear-btn" id="tagClearBtn" aria-label="清除标签筛选">清除</button>
                </div>
                <div class="tag-cloud" id="tagCloud">
                    <!-- 动态生成标签 -->
                </div>
            </div>

            <div class="content-wrapper" id="contentWrapper">
                <article class="content" id="content">
                    <div class="loading" id="loadingSkeleton">
                        <!-- Section 1 -->
                        <div class="skeleton-section">
                            <div class="skeleton-section-header"></div>
                            <div class="skeleton-grid">
                                <div class="skeleton-card">
                                    <div class="skeleton-card-image"></div>
                                    <div class="skeleton-card-content">
                                        <div class="skeleton-card-header">
                                            <div class="skeleton-tag"></div>
                                        </div>
                                        <div class="skeleton-title"></div>
                                        <div class="skeleton-desc"></div>
                                        <div class="skeleton-desc short"></div>
                                    </div>
                                </div>
                                <div class="skeleton-card">
                                    <div class="skeleton-card-image"></div>
                                    <div class="skeleton-card-content">
                                        <div class="skeleton-card-header">
                                            <div class="skeleton-tag"></div>
                                        </div>
                                        <div class="skeleton-title short"></div>
                                        <div class="skeleton-desc"></div>
                                        <div class="skeleton-desc"></div>
                                    </div>
                                </div>
                                <div class="skeleton-card">
                                    <div class="skeleton-card-image"></div>
                                    <div class="skeleton-card-content">
                                        <div class="skeleton-card-header">
                                            <div class="skeleton-tag"></div>
                                        </div>
                                        <div class="skeleton-title"></div>
                                        <div class="skeleton-desc short"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Section 2 -->
                        <div class="skeleton-section">
                            <div class="skeleton-section-header"></div>
                            <div class="skeleton-grid">
                                <div class="skeleton-card">
                                    <div class="skeleton-card-image"></div>
                                    <div class="skeleton-card-content">
                                        <div class="skeleton-card-header">
                                            <div class="skeleton-tag"></div>
                                        </div>
                                        <div class="skeleton-title short"></div>
                                        <div class="skeleton-desc"></div>
                                    </div>
                                </div>
                                <div class="skeleton-card">
                                    <div class="skeleton-card-image"></div>
                                    <div class="skeleton-card-content">
                                        <div class="skeleton-card-header">
                                            <div class="skeleton-tag"></div>
                                        </div>
                                        <div class="skeleton-title"></div>
                                        <div class="skeleton-desc"></div>
                                        <div class="skeleton-desc short"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="loading-text">
                            正在加载资讯
                            <span class="loading-dots">
                                <span></span>
                                <span></span>
                                <span></span>
                            </span>
                        </div>
                    </div>
                </article>

                <!-- 可拖拽分隔线 -->
                <div class="split-divider" id="splitDivider"></div>

                <!-- 预览面板 -->
                <div class="preview-panel" id="previewPanel">
                    <div class="preview-toolbar">
                        <div class="preview-url" id="previewUrl" title=""></div>
                        <div class="preview-actions">
                            <button class="preview-btn preview-open-btn" id="previewOpenBtn" aria-label="在新标签页打开">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M15 3h6v6" />
                                    <path d="M10 14 21 3" />
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                                </svg> 打开
                            </button>
                            <button class="preview-btn preview-close-btn" id="previewCloseBtn" aria-label="关闭预览">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <line x1="18" y1="6" x2="6" y2="18" />
                                    <line x1="6" y1="6" x2="18" y2="18" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="preview-content">
                        <div class="preview-placeholder" id="previewPlaceholder">
                            <svg class="icon icon-xl" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="2" y1="12" x2="22" y2="12" />
                                <path
                                    d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                            </svg>
                            <p>正在加载页面预览...</p>
                            <span class="preview-placeholder-hint">部分网站可能无法嵌入显示</span>
                        </div>
                        <div class="preview-loading" id="previewLoading">
                            <div class="preview-skeleton">
                                <!-- 浏览器地址栏骨架 -->
                                <div class="preview-skeleton-toolbar">
                                    <div class="preview-skeleton-dots">
                                        <span></span>
                                        <span></span>
                                        <span></span>
                                    </div>
                                    <div class="preview-skeleton-address"></div>
                                </div>
                                <!-- 页面内容骨架 -->
                                <div class="preview-skeleton-content">
                                    <div class="preview-skeleton-header"></div>
                                    <div class="preview-skeleton-text">
                                        <div class="preview-skeleton-line long"></div>
                                        <div class="preview-skeleton-line"></div>
                                        <div class="preview-skeleton-line medium"></div>
                                    </div>
                                    <div class="preview-skeleton-grid">
                                        <div class="preview-skeleton-card"></div>
                                        <div class="preview-skeleton-card"></div>
                                    </div>
                                    <div class="preview-skeleton-text">
                                        <div class="preview-skeleton-line"></div>
                                        <div class="preview-skeleton-line short"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="preview-loading-text">
                                正在加载页面
                                <span class="loading-dots">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </span>
                            </div>
                        </div>
                        <div class="preview-error hidden" id="previewError">
                            <div class="preview-error-icon">🚫</div>
                            <p>此网站不支持嵌入预览</p>
                            <button class="btn btn-primary" id="previewErrorOpenBtn">在新标签页打开</button>
                        </div>
                        <div class="preview-special hidden" id="previewSpecial">
                            <div class="preview-special-icon">📄</div>
                            <h3 class="preview-special-title">ArXiv 论文</h3>
                            <p class="preview-special-desc">由于 ArXiv 安全策略，无法在页面内预览 PDF。</p>
                            <div class="preview-special-actions">
                                <button class="btn btn-primary" id="specialPdfBtn">阅读 PDF</button>
                                <button class="btn btn-secondary" id="specialAbsBtn">查看摘要</button>
                            </div>
                        </div>
                        <!-- 读者模式：iframe 不可用时展示正文 -->
                        <div class="preview-reader hidden" id="previewReader">
                            <div class="preview-reader-header">
                                <h3 class="preview-reader-title" id="previewReaderTitle"></h3>
                                <button class="btn btn-ghost btn-sm preview-reader-open" id="previewReaderOpenBtn"
                                    type="button" aria-label="在新标签页打开">在新标签页打开</button>
                            </div>
                            <div class="preview-reader-content" id="previewReaderContent"></div>
                        </div>
                        <iframe id="previewIframe" class="preview-iframe"
                            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                    </div>
                </div>
            </div>
        </main>

        <!-- 版块快速导航 (Glassmorphism Floating Nav) -->
        <nav class="section-nav" id="sectionNav" aria-label="版块导航">
            <!-- 动态生成导航项 -->
        </nav>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <!-- Edit Modal -->
        <div id="editModal" class="modal-card hidden">
            <h3 class="modal-title">编辑收藏</h3>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="editTitleInput" class="modal-input" placeholder="输入标题...">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="editNoteInput" class="modal-input" rows="3" placeholder="添加备注 (可选)..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="editCancelBtn">取消</button>
                <button class="btn btn-primary" id="editSaveBtn">保存</button>
            </div>
        </div>

        <!-- Delete Modal -->
        <div id="deleteModal" class="modal-card hidden">
            <h3 class="modal-title">删除收藏</h3>
            <p class="modal-desc">确定要删除这个收藏吗？此操作无法撤销。</p>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="deleteCancelBtn">取消</button>
                <button class="btn btn-danger" id="deleteConfirmBtn">删除</button>
            </div>
        </div>
    </div>

    <!-- P3: 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle" aria-label="切换深色/浅色模式">
        <!-- 太阳图标 (浅色模式时显示) -->
        <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
        </svg>
        <!-- 月亮图标 (深色模式时显示) -->
        <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
    </button>

    <!-- 读者模式：正文安全渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.0/dist/purify.min.js" crossorigin="anonymous"></script>
    <script src="app.js?v=36"></script>
</body>

</html>
